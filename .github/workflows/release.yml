name: Release

on:
  push:
    tags:
      - "*-lazer"

env:
  DOTNET_VERSION: "8.0.x"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      semver: ${{ steps.v.outputs.semver }}
      nuget: ${{ steps.v.outputs.nuget }}
      velopack: ${{ steps.v.outputs.velopack }}
      assembly: ${{ steps.v.outputs.assembly }}
      file: ${{ steps.v.outputs.file }}

    steps:
      - id: v
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          SEMVER=${VERSION#v}
          BASE=${SEMVER%%-*}

          IFS='.' read -ra P <<< "$BASE"
          while [ ${#P[@]} -lt 4 ]; do P+=("0"); done

          NUM="${P[0]}.${P[1]}.${P[2]}.${P[3]}"
          NUGET="${P[0]}.${P[1]}.${P[2]}"
          VELO="$NUGET"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "nuget=$NUGET" >> $GITHUB_OUTPUT
          echo "velopack=$VELO" >> $GITHUB_OUTPUT
          echo "assembly=$NUM" >> $GITHUB_OUTPUT
          echo "file=$NUM" >> $GITHUB_OUTPUT

  build:
    needs: version
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            name: windows
            exe: "osu!.exe"

          - os: macos-latest
            runtime: osx-x64
            name: macos-intel
            exe: "osu!"

          - os: macos-latest
            runtime: osx-arm64
            name: macos-arm
            exe: "osu!"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Restore
        run: dotnet restore osu.Desktop/osu.Desktop.csproj -r ${{ matrix.runtime }} --verbosity minimal

      - name: Publish
        shell: bash
        run: |
          dotnet publish osu.Desktop/osu.Desktop.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained false \
            -o publish/${{ matrix.runtime }} \
            -p:Version=${{ needs.version.outputs.semver }} \
            -p:FileVersion=${{ needs.version.outputs.file }} \
            -p:AssemblyVersion=${{ needs.version.outputs.assembly }}

      - name: macOS chmod
        if: matrix.os == 'macos-latest'
        run: chmod +x publish/${{ matrix.runtime }}/${{ matrix.exe }}

      - name: Velopack pack
        shell: bash
        run: |
          ICON_ARG=""
          CHANNEL="win"

          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ICON_ARG="-i osu.Desktop/lazer.ico"
            CHANNEL="win"
          elif [ "${{ matrix.runtime }}" == "osx-x64" ]; then
            CHANNEL="osx-x64"
          elif [ "${{ matrix.runtime }}" == "osx-arm64" ]; then
            CHANNEL="osx-arm64"
          fi

          vpk pack \
            -u "murasame" \
            -v "${{ needs.version.outputs.velopack }}" \
            -p "publish/${{ matrix.runtime }}" \
            -e "${{ matrix.exe }}" \
            -c "$CHANNEL" \
            --packAuthors "murasame! Team" \
            --packTitle "murasame! (lazer)" \
            $ICON_ARG

      - name: Normalize asset names
        shell: bash
        run: |
          cd Releases || exit 0

          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv *Setup.exe install.exe 2>/dev/null || true
            rm *-Portable.zip 2>/dev/null || true
          fi

          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ "${{ matrix.runtime }}" == "osx-x64" ]; then
              mv *-Portable.zip murasame.app.Intel.zip 2>/dev/null || true
            else
              mv *-Portable.zip murasame.app.Apple.Silicon.zip 2>/dev/null || true
            fi
            rm *.pkg 2>/dev/null || true
          fi

      - name: Collect
        shell: bash
        run: |
          mkdir -p out
          cp -r Releases/* out/ || true

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: out/

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare
        shell: bash
        run: |
          mkdir -p release
          cp -r artifacts/* release/ || true

          if [ -z "$(ls -A release)" ]; then
            echo "empty release"
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: murasame! ${{ github.ref_name }}
          files: release/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
